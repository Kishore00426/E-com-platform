services:
  # The Backend API (Web Service)
  - type: web
    name: e-backend
    runtime: node
    rootDir: e-backend
    buildCommand: npm install && npm run build
    startCommand: node Server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # The Frontend (Static Site)
  - type: static
    name: e-frontend
    runtime: static
    rootDir: e-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
